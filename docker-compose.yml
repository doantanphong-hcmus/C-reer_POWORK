services:
  # 1. Dịch vụ Cơ sở dữ liệu PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: powork_db
    restart: unless-stopped
    ports:
      - "5432:5432" # Mở cổng 5432 ra ngoài máy host nếu cần kết nối trực tiếp (ví dụ qua DBeaver/PgAdmin)
    environment:
      POSTGRES_USER: powork_user
      POSTGRES_PASSWORD: powork_pass
      POSTGRES_DB: powork_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U powork_user -d powork_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Dịch vụ Backend API
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: powork_backend
    restart: unless-stopped
    ports:
      - "3001:3001" # Host port 3001 trỏ về container port 3001
    environment:
      NODE_ENV: production
      PORT: 3001
      # Sử dụng tên dịch vụ 'postgres' thay vì 'localhost' để kết nối nội bộ giữa các container
      DATABASE_URL: postgresql://powork_user:powork_pass@postgres:5432/powork_db
      JWT_SECRET: powork_super_secret_dev_2026
      JWT_EXPIRES_IN: 7d
    command: sh -c "npx prisma migrate deploy && npm start"
    depends_on:
      postgres:
        condition: service_healthy # Chỉ chạy Backend khi PostgreSQL đã hoàn toàn sẵn sàng

  # 3. Dịch vụ Frontend Next.js
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: powork_frontend
    restart: unless-stopped
    ports:
      - "3000:3000" # Host port 3000 trỏ về container port 3000
    environment:
      NODE_ENV: production
      # Trỏ Next.js API URL đến Backend chạy ở localhost:3001 dưới góc nhìn của trình duyệt người dùng
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Cấu hình gọi nội mạng Docker cho Server-Side Rendering (SSR) trong Next.js
      INTERNAL_API_URL: http://backend:3001
    depends_on:
      - backend

volumes:
  postgres_data:
